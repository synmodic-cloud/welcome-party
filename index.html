<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Party</title>

<!-- ======================================================================
     FONTS & CDN LIBRARIES  (SPEC.md §11 — CDN only, no build step)
     ====================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script defer src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ======================================================================
   STYLE TOKENS  (CLAUDE.md — placeholder hexes until brand pass)
   ====================================================================== */
:root {
  --bg:      #FFF9F2;   /* warm off-white */
  --coral:   #FF6B5E;
  --violet:  #8B5CF6;
  --sky:     #38BDF8;
  --sunny:   #FFD166;
  --mint:    #3ECFA5;   /* 5th team accent — placeholder until brand pass */
  --ink:     #3B3243;
  --muted:   #7A7185;
  --card:    #FFFFFF;
  --radius:  22px;
  --shadow:  0 6px 24px rgba(60, 40, 80, .10);
  --display: 'Archivo Black', sans-serif;
  --body:    'Plus Jakarta Sans', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body);
  min-height: 100vh;
}
h1, h2, h3 { font-family: var(--display); font-weight: 400; margin: 0; }
[hidden] { display: none !important; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1.5rem;
}
.btn {
  font-family: var(--body);
  font-weight: 800;
  font-size: 1.05rem;
  color: #fff;
  background: var(--coral);
  border: none;
  border-radius: 999px;
  padding: .95rem 1.8rem;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(255, 107, 94, .4);
  transition: transform .08s ease;
}
.btn:active { transform: scale(.97); }
.btn.violet { background: var(--violet); box-shadow: 0 4px 14px rgba(139, 92, 246, .4); }
.input {
  font-family: var(--body);
  font-size: 1.05rem;
  padding: .9rem 1.1rem;
  border: 2px solid #E9E2F2;
  border-radius: 14px;
  width: 100%;
  background: #fff;
  color: var(--ink);
}
.input:focus { outline: none; border-color: var(--violet); }
.notice {
  margin-top: .8rem;
  padding: .7rem 1rem;
  border-radius: 12px;
  background: #FFF1D6;
  color: #7A5A00;
  font-size: .92rem;
  font-weight: 600;
}
.event-subtitle { color: var(--muted); font-weight: 600; }

/* Offline pill — shown while Firebase is not configured */
#offline-pill {
  position: fixed;
  top: .8rem;
  right: .8rem;
  z-index: 50;
  background: var(--sunny);
  color: #6B4E00;
  font-size: .8rem;
  font-weight: 700;
  padding: .35rem .8rem;
  border-radius: 999px;
  box-shadow: var(--shadow);
}
@media (max-width: 600px) {
  /* keep the pill clear of the team-view heading on phones */
  #offline-pill { top: auto; bottom: .8rem; right: 50%; transform: translateX(50%); }
}

/* ---------- TEAM VIEW (mobile-first) ---------- */
#view-team { max-width: 430px; margin: 0 auto; padding: 1.2rem; }
#view-team .event-name { font-size: 1.5rem; line-height: 1.2; }
#view-team header { margin: .8rem 0 1.4rem; }
.team-dot { width: 22px; height: 22px; border-radius: 50%; display: inline-block; flex: none; }
.wallet { display: flex; gap: .6rem; margin-top: 1.1rem; }
.wallet-stat {
  flex: 1; text-align: center; background: var(--bg);
  border-radius: 14px; padding: .7rem .3rem;
}
.wallet-stat b { display: block; font-size: 1.35rem; }
.wallet-stat span { font-size: .78rem; color: var(--muted); font-weight: 600; }

/* ---------- SCRAMBLE (team modals, options) ---------- */
.modal {
  position: fixed; inset: 0; background: rgba(59, 50, 67, .55);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem; z-index: 40;
}
.modal-card { max-width: 420px; width: 100%; max-height: 85vh; overflow: auto; }
.qm-opt {
  display: block; width: 100%; margin: .5rem 0; padding: .9rem 1rem;
  font-size: 1rem; font-weight: 700; text-align: left;
  background: var(--bg); border: 2px solid #E9E2F2; border-radius: 14px;
  cursor: pointer; font-family: var(--body); color: var(--ink);
}
.qm-opt:disabled { opacity: .55; }
.row { display: flex; gap: .5rem; margin-top: .6rem; }
#team-clock { text-align: center; font-family: var(--display); font-size: 1.3rem; margin-top: .8rem; }
#team-ticker { color: var(--muted); font-size: .85rem; text-align: center; min-height: 1.2em; margin-top: .3rem; }
#card-notice { font-size: .85rem; }

/* ---------- BOARD VIEW (1080p projection — hall-scale type) ---------- */
#view-board { text-align: center; padding: 4vh 4vw; }
#view-board .event-name { font-size: clamp(3rem, 8vw, 7rem); line-height: 1.05; }
#view-board .event-subtitle { font-size: clamp(1.1rem, 2.4vw, 2rem); margin-top: 1.2rem; }
#board-waiting { margin-top: 6vh; font-size: clamp(1.2rem, 2.6vw, 2.2rem); font-weight: 700; color: var(--muted); }
#board-team-list { list-style: none; padding: 0; margin: 2vh auto 0; font-size: clamp(1.4rem, 3vw, 2.6rem); font-weight: 800; }
.lb-row { display: flex; gap: 1.2vw; align-items: baseline; justify-content: center; padding: .4vh 0; }
.lb-rank { font-family: var(--display); font-size: .8em; color: var(--muted); min-width: 2ch; }
.lb-stats { font-size: .55em; color: var(--muted); font-weight: 700; }
#board-ticker {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink); color: #fff; font-weight: 700;
  font-size: clamp(1rem, 2vw, 1.6rem); padding: .6em 1em; text-align: center;
}
#board-ticker:empty { display: none; }
#board-ticker div { animation: slidein .4s ease; }
#board-ticker div + div { display: none; } /* newest only on the strip */
@keyframes slidein { from { transform: translateY(100%); opacity: 0; } to { transform: none; opacity: 1; } }

/* ---------- ADMIN CONSOLE ---------- */
.panel-title { font-size: 1.05rem; margin-bottom: .8rem; }
.field { display: block; font-weight: 700; font-size: .85rem; color: var(--muted); margin: .7rem 0; }
.field .input { margin-top: .3rem; }
.field-check { display: block; font-weight: 700; font-size: .95rem; margin: .9rem 0; }
.btn.mini { font-size: .8rem; padding: .4rem .8rem; background: #fff; color: var(--ink); border: 2px solid #E9E2F2; box-shadow: none; }
.btn.danger { background: var(--coral); color: #fff; }
.btn.mini.danger { background: #fff; color: var(--coral); border-color: var(--coral); }
.btn.mini.phase-on { background: var(--violet); color: #fff; border-color: var(--violet); }
.phase-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
.q-item, .lc-row { display: flex; align-items: center; gap: .6rem; padding: .55rem 0; border-bottom: 1px solid #F1EAF8; flex-wrap: wrap; }
.q-badge { font-weight: 800; background: var(--sunny); border-radius: 8px; padding: .15rem .5rem; font-size: .8rem; }
.q-text { flex: 1; min-width: 180px; }
.q-off { opacity: .45; text-decoration: line-through; }
.q-actions { display: flex; gap: .4rem; margin-left: auto; align-items: center; }
.q-opt { display: flex; align-items: center; gap: .5rem; }
.q-opt .input { margin-top: 0; }
.q-import { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; margin: .6rem 0 1rem; }
.mini-num { width: 74px; padding: .4rem .5rem; font-size: .85rem; }
.data-raw { background: var(--bg); border-radius: 12px; padding: 1rem; font-size: .75rem; overflow-x: auto; max-height: 50vh; }
#admin-toast {
  position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; font-weight: 700; font-size: .9rem;
  padding: .6rem 1.2rem; border-radius: 999px; z-index: 60; box-shadow: var(--shadow);
}
.board-challenge { font-family: var(--display); font-size: clamp(1.6rem, 4vw, 3.4rem); margin-top: 3vh; }
.board-clock { font-family: var(--display); font-size: clamp(3rem, 10vw, 8rem); }

/* ---------- HOST VIEW ---------- */
#view-host { max-width: 860px; margin: 0 auto; padding: 1.2rem; }
#host-tabs { display: flex; flex-wrap: wrap; gap: .5rem; margin: 1.2rem 0; }
#host-tabs button {
  font-family: var(--body);
  font-weight: 700;
  font-size: .9rem;
  padding: .55rem 1rem;
  border-radius: 999px;
  border: 2px solid #E9E2F2;
  background: #fff;
  color: var(--muted);
  cursor: pointer;
}
#host-tabs button.active { background: var(--violet); border-color: var(--violet); color: #fff; }
#pin-form { max-width: 340px; margin: 14vh auto 0; text-align: center; }
#pin-form .input { text-align: center; letter-spacing: .4em; font-size: 1.4rem; }

/* ======================================================================
   PRINT  (station posters / cards / staff sheet — built in a later step)
   ====================================================================== */
@media print {
  #offline-pill { display: none; }
}
</style>
</head>
<body>

<div id="offline-pill" hidden>⚡ Backend not connected</div>

<!-- ====================================================================
     TEAM VIEW  —  #/team (default) · one nominated phone per team
     ==================================================================== -->
<section id="view-team" hidden>
  <header>
    <h1 class="event-name">…</h1>
    <div class="event-subtitle"></div>
  </header>
  <div class="card" id="team-register">
    <h2 style="font-size:1.15rem; margin-bottom:1rem;">Register your team</h2>
    <input id="team-name-input" class="input" type="text" maxlength="24"
           placeholder="Team name" autocomplete="off">
    <div style="margin-top:1rem; text-align:center;">
      <button id="join-btn" class="btn">Join</button>
    </div>
    <div id="team-notice" class="notice" hidden></div>
  </div>
  <div class="card" id="team-joined" hidden>
    <div style="display:flex; align-items:center; gap:.7rem;">
      <span id="team-dot" class="team-dot"></span>
      <h2 id="team-joined-name" style="font-size:1.3rem;"></h2>

    <div class="wallet">

        <button id="manual-go" class="btn mini">Go</button>

<!-- Scramble modals: QR scanner + question/marking -->

<!-- ====================================================================
     BOARD VIEW  —  #/board · laptop → projector, whole-room display
     ==================================================================== -->
<section id="view-board" hidden>
  <h1 class="event-name">…</h1>
  <div class="event-subtitle"></div>
  <div id="board-phase"></div>

     HOST VIEW  —  #/host · PIN-gated console (7 tabs)

<script>
/* ======================================================================
   CONFIG — defaults mirror /config in the Realtime Database (SPEC.md §11).
   Values here are fallbacks; once Firebase is wired, /config wins.
   ====================================================================== */
/* Firebase web config — public identifiers by design (SPEC.md §11).
   databaseURL is filled in once the Realtime Database instance exists. */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCk0l0sLaGAyzetGt61tNzuv6sZUnrOXYg",
  authDomain: "welcome-party2026.firebaseapp.com",
  databaseURL: "https://welcome-party2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "welcome-party2026",
  storageBucket: "welcome-party2026.firebasestorage.app",
  messagingSenderId: "685493857628",
  appId: "1:685493857628:web:c7dcde709ff7e64b792599",
};

const DEFAULT_CONFIG = {
  eventName: '2026 xBU GA Welcome Party',
  eventSubtitle: '22 Jul 2026 · Sports hall',
  labels: { challenge1: 'The Scramble', challenge2: 'Blind Shot' },
  sounds: false,
  bonuses: [30, 20, 10],
  slotsPerStation: 3,
  lockoutSec: 30,
  scrambleMins: 25,
  blindBaseSec: 120,
  teamCap: 5,
  phase: 'setup',
  scrambleEndsAt: null,
  hostPin: '1234',
};

/* Team accent colours, assigned by join order (5th hex pending brand pass) */
const TEAM_COLOURS = ['#FF6B5E', '#8B5CF6', '#38BDF8', '#FFD166', '#3ECFA5'];

let config = structuredClone(DEFAULT_CONFIG);

/* ======================================================================
   FIREBASE — shared state across the 7 devices. Offline mode until the
   web config is pasted above; every feature must degrade gracefully.
   ====================================================================== */
let db = null;

function initFirebase() {
  if (!FIREBASE_CONFIG || !FIREBASE_CONFIG.databaseURL) {
    document.getElementById('offline-pill').hidden = false;
    return;
  }
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  db.ref('config').on('value', (snap) => {
    config = { ...structuredClone(DEFAULT_CONFIG), ...(snap.val() || {}) };
    renderEventBranding();
    renderBoardPhase();
    renderBoardTeams();
    renderTeamStatus();
    updateBoardClock();
    /* keep the phase highlight in Live Control current */
    if (adminSubsStarted && activeTab === 'Live Control') renderHostPanel();
  });
}

/* ======================================================================
   ROUTER — one page, three hash-routed views (SPEC.md §2)
   ====================================================================== */
const VIEWS = ['team', 'board', 'host'];

function currentView() {
  const m = location.hash.match(/^#\/(\w+)/);
  return m && VIEWS.includes(m[1]) ? m[1] : 'team';
}

function renderRoute() {
  const view = currentView();
  document.body.dataset.view = view;
  VIEWS.forEach((v) => {
    document.getElementById('view-' + v).hidden = (v !== view);
  });
  renderEventBranding();
}

/* Event branding — admin-set name/subtitle propagate to every view (§1.1) */
function renderEventBranding() {
  document.title = config.eventName;
  document.querySelectorAll('.event-name').forEach((el) => { el.textContent = config.eventName; });
  document.querySelectorAll('.event-subtitle').forEach((el) => { el.textContent = config.eventSubtitle; });
}

/* ======================================================================
   TEAM VIEW — registration, one-device binding, session restore
   (SPEC.md §4.1, §4.6)
   ====================================================================== */
const LS_TEAM_ID = 'sbTeamId';
const LS_DEVICE_TOKEN = 'sbDeviceToken';

function teamNotice(msg) {
  const el = document.getElementById('team-notice');
  el.textContent = msg;
  el.hidden = false;
}

function deviceToken() {
  let t = localStorage.getItem(LS_DEVICE_TOKEN);
  if (!t) {
    t = (crypto.randomUUID) ? crypto.randomUUID()
      : 'd-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem(LS_DEVICE_TOKEN, t);
  }
  return t;
}

function handleJoin() {
  const name = document.getElementById('team-name-input').value.trim();
  if (!name) { teamNotice('Give your team a name first.'); return; }
  if (!db) {
    teamNotice('Backend not connected yet — registration activates once Firebase is configured.');
    return;
  }
  const token = deviceToken();
  const newRef = db.ref('teams').push();
  let joinedId = null;

  db.ref('teams').transaction((teams) => {
    const list = teams || {};
    /* Same name on a released team? → claim it (host-controlled transfer, §4.6) */
    for (const id in list) {
      if ((list[id].name || '').toLowerCase() === name.toLowerCase()) {
        if (!list[id].deviceToken) {
          list[id].deviceToken = token;
          joinedId = id;
          return list;
        }
        return; /* name taken by an active team → abort */
      }
    }
    if (Object.keys(list).length >= (config.teamCap || 5)) return; /* cap reached → abort */
    joinedId = newRef.key;
    list[newRef.key] = {
      name: name,
      colour: TEAM_COLOURS[Object.keys(list).length % TEAM_COLOURS.length],
      deviceToken: token,
      bonusSec: 0,
      joinedAt: Date.now(),
    };
    return list;
  }, (err, committed) => {
    if (err) { teamNotice('Connection hiccup — try again.'); return; }
    if (!committed) {
      db.ref('teams').once('value').then((snap) => {
        const list = snap.val() || {};
        const taken = Object.values(list).some((t) =>
          (t.name || '').toLowerCase() === name.toLowerCase() && t.deviceToken);
        teamNotice(taken
          ? 'This team is already active on another device.'
          : 'All ' + (config.teamCap || 5) + ' team spots are taken.');
      });
      return;
    }
    localStorage.setItem(LS_TEAM_ID, joinedId);
    watchMyTeam(joinedId);
  });
}

/* Live-subscribe to my team record; enforce the device binding */
let myTeamId = null;
let myTeamData = null;

function watchMyTeam(teamId) {
  db.ref('teams/' + teamId).on('value', (snap) => {
    const team = snap.val();
    const reg = document.getElementById('team-register');
    const joined = document.getElementById('team-joined');
    if (!team) { /* game was reset — back to registration */
      localStorage.removeItem(LS_TEAM_ID);
      myTeamId = null; myTeamData = null;
      reg.hidden = false; joined.hidden = true;
      return;
    }
    if (team.deviceToken !== localStorage.getItem(LS_DEVICE_TOKEN)) {
      /* host released this team & another phone claimed it */
      localStorage.removeItem(LS_TEAM_ID);
      db.ref('teams/' + teamId).off();
      myTeamId = null; myTeamData = null;
      reg.hidden = false; joined.hidden = true;
      teamNotice('This team is now active on another device.');
      return;
    }
    myTeamId = teamId; myTeamData = team;
    reg.hidden = true; joined.hidden = false;
    document.getElementById('team-joined-name').textContent = team.name;
    document.getElementById('team-dot').style.background = team.colour;
    document.getElementById('w-seconds').textContent = (team.bonusSec || 0) + 's';
    document.getElementById('w-cards').textContent = Object.keys(team.powerups || {}).length;
    document.getElementById('w-stations').textContent = Object.keys(team.cleared || {}).length;
    renderTeamStatus();
  });
}

/* Phase-aware status line on the joined card */
function renderTeamStatus() {
  const el = document.getElementById('team-status');
  if (!el || document.getElementById('team-joined').hidden) return;
  const phase = config.phase || 'setup';
  el.textContent =
    phase === 'scramble' ? config.labels.challenge1 + ' is on — go hunt!' :
    phase === 'blindshot' ? 'Wallet locked — it’s ' + config.labels.challenge2 + ' time.' :
    phase === 'results' ? 'Game over — eyes on the big screen!' :
    'You’re in! Waiting for the game to begin…';
  document.getElementById('team-scramble').hidden = (phase !== 'scramble');
}

/* ======================================================================
   SCRAMBLE ENGINE — scan → question → tiered slots → wallet
   (SPEC.md §4.3–4.5, §5)
   ====================================================================== */
let scanner = null;
let lockoutTimer = null;

function canSubmit() {
  return (config.phase || 'setup') === 'scramble' &&
    (!config.scrambleEndsAt || Date.now() < config.scrambleEndsAt);
}

function ordinal(i) { return ['1st', '2nd', '3rd', '4th', '5th'][i] || (i + 1) + 'th'; }
function stationNum(id) { return parseInt(id.slice(1), 10); }
function pushFeed(msg) { db.ref('feed').push({ msg: msg, ts: Date.now() }); }

/* ---- QR scanner (html5-qrcode) with manual fallback ---- */
function openScanner() {
  document.getElementById('scan-modal').hidden = false;
  scanner = new Html5Qrcode('qr-reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 230, height: 230 } },
    (text) => { stopScanner(); openStation(text); },
    () => {} /* per-frame decode misses — ignore */
  ).catch(() => {
    /* camera denied/broken — the game never dies on this (SPEC §4.3) */
    stopScanner();
    document.getElementById('manual-row').hidden = false;
    qmSetup('—');
    qmMessage('Camera unavailable — type the station number instead.');
  });
}

function stopScanner() {
  if (scanner) { try { scanner.stop(); } catch (e) {} scanner = null; }
  document.getElementById('scan-modal').hidden = true;
}

/* ---- Question modal helpers ---- */
function qmSetup(stationLabel) {
  clearInterval(lockoutTimer);
  document.getElementById('qm-station').textContent = stationLabel;
  document.getElementById('qm-text').textContent = '';
  document.getElementById('qm-options').innerHTML = '';
  const res = document.getElementById('qm-result');
  res.hidden = true; res.textContent = '';
  document.getElementById('q-modal').hidden = false;
}

function qmMessage(msg) {
  const res = document.getElementById('qm-result');
  res.textContent = msg;
  res.hidden = false;
}

function closeQuestionModal() {
  clearInterval(lockoutTimer);
  document.getElementById('q-modal').hidden = true;
}

/* ---- Scan/entry → pre-checks → question ---- */
async function openStation(raw) {
  if (!myTeamId || !db) return;
  const m = String(raw).trim().toUpperCase().match(/^(?:GA-)?S?0*([1-9]\d?)$/);
  if (!m) { qmSetup('—'); qmMessage("That code isn't part of the game."); return; }
  const id = 'S' + m[1].padStart(2, '0');
  qmSetup('Station ' + stationNum(id));
  if (!canSubmit()) {
    qmMessage(config.phase === 'scramble' ? "Time's up — submissions are locked." : 'Wait for the host to start the hunt.');
    return;
  }
  const [qSnap, sSnap] = await Promise.all([
    db.ref('questions/' + id).once('value'),
    db.ref('stations/' + id + '/slots').once('value'),
  ]);
  const q = qSnap.val();
  if (!q || q.active === false) { qmMessage("This station isn't part of the game."); return; }
  if (myTeamData.cleared && myTeamData.cleared[id]) { qmMessage("You've already cleared this station."); return; }
  const lockUntil = myTeamData.lockouts && myTeamData.lockouts[id];
  if (lockUntil && lockUntil > Date.now()) { startLockoutCountdown(lockUntil); return; }
  const slots = sSnap.val() || [];
  if (slots.length >= (config.slotsPerStation || 3)) {
    qmMessage('Station closed — ' + slots.length + ' teams got here first. Keep hunting!');
    return;
  }
  document.getElementById('qm-text').textContent = q.text;
  const box = document.getElementById('qm-options');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'qm-opt';
    btn.textContent = String.fromCharCode(65 + i) + '.  ' + opt;
    btn.addEventListener('click', () => answerStation(id, q, i));
    box.appendChild(btn);
  });
}

/* ---- Marking: hash check → atomic slot claim → bank the bonus ---- */
async function answerStation(id, q, idx) {
  document.querySelectorAll('.qm-opt').forEach((b) => { b.disabled = true; });
  if (!canSubmit()) { qmMessage("Time's up — submissions are locked."); return; }
  const hash = await sha256(id + '|' + q.salt + '|' + idx);
  if (hash !== q.answerHash) {
    const until = Date.now() + (config.lockoutSec || 30) * 1000;
    db.ref('teams/' + myTeamId + '/lockouts/' + id).set(until);
    startLockoutCountdown(until);
    return;
  }
  db.ref('stations/' + id + '/slots').transaction((slots) => {
    slots = slots || [];
    if (slots.some((s) => s.teamId === myTeamId)) return;       /* already have a slot */
    if (slots.length >= (config.slotsPerStation || 3)) return;  /* station closed */
    slots.push({ teamId: myTeamId, ts: Date.now() });
    return slots;
  }, (err, committed, snap) => {
    if (err) { qmMessage('Connection hiccup — try again.'); return; }
    if (!committed) {
      qmMessage('Station closed — ' + (config.slotsPerStation || 3) + ' teams got here first. Keep hunting!');
      return;
    }
    const slots = snap.val() || [];
    const slotIdx = slots.findIndex((s) => s.teamId === myTeamId);
    const bonus = (config.bonuses || [30, 20, 10])[slotIdx] || 0;
    const n = stationNum(id);
    db.ref('teams/' + myTeamId + '/cleared/' + id).set(true);
    db.ref('teams/' + myTeamId + '/bonusSec').transaction((v) => (v || 0) + bonus);
    pushFeed(myTeamData.name + ' took ' + ordinal(slotIdx) + ' on Station ' + n + '! +' + bonus + 's');
    const left = (config.slotsPerStation || 3) - slots.length;
    if (left === 1) pushFeed('Station ' + n + ' — one slot left!');
    if (left === 0) pushFeed('Station ' + n + ' is closed!');
    qmMessage('✅ Correct — ' + ordinal(slotIdx) + ' to solve! +' + bonus + 's banked.');
    if (slotIdx === 0 && typeof confetti !== 'undefined') {
      confetti({ particleCount: 90, spread: 70, origin: { y: .7 } });
    }
  });
}

function startLockoutCountdown(until) {
  clearInterval(lockoutTimer);
  const render = () => {
    const s = Math.ceil((until - Date.now()) / 1000);
    if (s <= 0) {
      clearInterval(lockoutTimer);
      qmMessage('Lock expired — close this and scan the station to try again.');
      return;
    }
    qmMessage('❌ Not quite — this station is locked for you for ' + s + 's.');
  };
  render();
  lockoutTimer = setInterval(render, 500);
}

/* ---- Power-up card code entry: single-use, transaction-claimed (§4.4) ---- */
function cardNotice(msg) {
  const el = document.getElementById('card-notice');
  el.textContent = msg;
  el.hidden = false;
  clearTimeout(cardNotice._t);
  cardNotice._t = setTimeout(() => { el.hidden = true; }, 5000);
}

function redeemCard(raw) {
  const code = String(raw).trim().toUpperCase();
  if (!code || !myTeamId) return;
  if (!canSubmit()) { cardNotice('Card codes can only be entered during the hunt.'); return; }
  db.ref('cards/' + code).transaction((c) => {
    if (c === null) return { redeemedBy: myTeamId, ghost: true }; /* tentative — re-run against server data if the card exists */
    if (c.redeemedBy) return;                                     /* abort: already claimed */
    c.redeemedBy = myTeamId;
    return c;
  }, (err, committed, snap) => {
    if (err) { cardNotice('Connection hiccup — try again.'); return; }
    const card = snap && snap.val();
    if (!committed) { cardNotice('Already claimed — another team got this card first.'); return; }
    if (card && card.ghost) {
      db.ref('cards/' + code).remove(); /* we created a ghost — code doesn't exist */
      cardNotice("Hmm, that code isn't right. Check with the referee.");
      return;
    }
    db.ref('teams/' + myTeamId + '/powerups/' + code).set({ type: card.type, value: card.value ?? null });
    pushFeed(myTeamData.name + ' collected a power-up card!');
    cardNotice('🎴 ' + String(card.type || 'Power-up').toUpperCase() + ' collected!');
    document.getElementById('card-code').value = '';
  });
}

/* ======================================================================
   BOARD VIEW — live team list + phase headline
   (full leaderboard / timer stage come with the Scramble engine)
   ====================================================================== */
function renderBoardPhase() {
  const el = document.getElementById('board-phase');
  const phase = config.phase || 'setup';
  if (phase === 'scramble') {
    el.innerHTML = '<div class="board-challenge">' + esc(config.labels.challenge1) + '</div>' +
      '<div id="board-clock" class="board-clock"></div>';
    updateBoardClock();
  } else if (phase === 'blindshot') {
    el.innerHTML = '<div class="board-challenge">' + esc(config.labels.challenge2) + '</div>';
  } else if (phase === 'results') {
    el.innerHTML = '<div class="board-challenge">Final results</div>';
    if (renderBoardPhase._last !== 'results' && currentView() === 'board' && typeof confetti !== 'undefined') {
      confetti({ particleCount: 220, spread: 100, origin: { y: .6 } });
    }
  } else {
    el.innerHTML = '';
  }
  renderBoardPhase._last = phase;
}

function updateBoardClock() {
  const scrambleLive = (config.phase || 'setup') === 'scramble' && config.scrambleEndsAt;
  const remain = scrambleLive ? Math.max(0, Math.floor((config.scrambleEndsAt - Date.now()) / 1000)) : 0;
  const fmt = Math.floor(remain / 60) + ':' + String(remain % 60).padStart(2, '0');
  const el = document.getElementById('board-clock');
  if (el) el.textContent = scrambleLive ? fmt : '';
  const tEl = document.getElementById('team-clock');
  if (tEl) tEl.textContent = scrambleLive ? (remain > 0 ? 'Time left  ' + fmt : "Time's up!") : '';
}

let boardTeams = {};

function watchBoardTeams() {
  if (!db) return;
  db.ref('teams').on('value', (snap) => {
    boardTeams = snap.val() || {};
    renderBoardTeams();
  });
}

function renderBoardTeams() {
  const phase = config.phase || 'setup';
  const ul = document.getElementById('board-team-list');
  const waiting = document.getElementById('board-waiting');
  const teams = Object.values(boardTeams);
  ul.innerHTML = '';
  if (phase === 'setup') {
    teams.sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0)).forEach((t) => {
      const li = document.createElement('li');
      li.textContent = t.name;
      li.style.color = t.colour;
      ul.appendChild(li);
    });
    waiting.textContent = teams.length
      ? teams.length + ' / ' + (config.teamCap || 5) + ' teams ready'
      : 'Waiting for teams to join…';
    return;
  }
  /* live leaderboard: banked time, then stations cleared, then join order */
  waiting.textContent = teams.length ? '' : 'No teams registered.';
  teams.sort((a, b) =>
    (b.bonusSec || 0) - (a.bonusSec || 0) ||
    Object.keys(b.cleared || {}).length - Object.keys(a.cleared || {}).length ||
    (a.joinedAt || 0) - (b.joinedAt || 0)
  ).forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'lb-row';
    const cards = Object.keys(t.powerups || {}).length;
    li.innerHTML = '<span class="lb-rank">' + (i + 1) + '</span>' +
      '<span style="color:' + esc(t.colour) + '">' + esc(t.name) + '</span>' +
      '<span class="lb-stats">' + Object.keys(t.cleared || {}).length + ' stations · ' +
      (t.bonusSec || 0) + 's' + (cards ? ' · 🎴' + cards : '') + '</span>';
    ul.appendChild(li);
  });
}

/* Small helpers shared by the admin tabs */
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

/* ---- Excel import: template download + bulk question upload ---- */
let lastImportReport = '';

function downloadQuestionTemplate() {
  const rows = [
    ['Question', 'Option A', 'Option B', 'Option C', 'Option D', 'Correct (A/B/C/D)'],
    ['What year was the company founded?', '1985', '1992', '2001', '2010', 'B'],
    ['Where is the head office?', 'Hong Kong', 'Singapore', 'Tokyo', 'Sydney', 'A'],
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 50 }, { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 16 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Questions');
  XLSX.writeFile(wb, 'questions-template.xlsx');
}

async function importQuestionsFromExcel(file, replace) {
  const CORRECT_MAP = { A: 0, B: 1, C: 2, D: 3, 1: 0, 2: 1, 3: 2, 4: 3 };
  let rows;
  try {
    const wb = XLSX.read(new Uint8Array(await file.arrayBuffer()), { type: 'array' });
    rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
  } catch (err) {
    lastImportReport = 'Could not read that file — is it a real Excel/CSV file?';
    renderHostPanel();
    return;
  }
  const parsed = [];
  const errors = [];
  rows.forEach((r, idx) => {
    const cell = (i) => String((r || [])[i] ?? '').trim();
    const cells = [0, 1, 2, 3, 4, 5].map(cell);
    if (!cells.some((c) => c)) return;                       /* blank row */
    if (idx === 0 && /correct/i.test(cells[5])) return;      /* template header row */
    const line = 'Row ' + (idx + 1);
    const options = cells.slice(1, 5);
    const correct = CORRECT_MAP[cells[5].toUpperCase()];
    if (!cells[0]) { errors.push(line + ': question text missing'); return; }
    if (options.some((o) => !o)) { errors.push(line + ': needs all 4 options'); return; }
    if (correct === undefined) { errors.push(line + ': Correct must be A, B, C or D'); return; }
    parsed.push({ text: cells[0], options: options, correct: correct });
  });

  if (!parsed.length) {
    lastImportReport = 'No valid questions found.' + (errors.length ? ' ' + errors.join(' · ') : '');
    renderHostPanel();
    return;
  }
  const existing = replace ? 0 : Object.keys(adminQuestions).length;
  if (existing + parsed.length > 99) {
    lastImportReport = 'Too many questions — the app supports up to 99 stations.';
    renderHostPanel();
    return;
  }
  const summary = 'Import ' + parsed.length + ' question' + (parsed.length === 1 ? '' : 's') +
    (replace ? ' and REPLACE the current set' : ' (added after the current set)') +
    (errors.length ? '. ' + errors.length + ' row(s) will be skipped.' : '') + ' Continue?';
  if (!confirm(summary)) return;

  /* allocate station ids, hash each answer, write in one batch */
  const taken = replace ? {} : { ...adminQuestions };
  const batch = {};
  for (const q of parsed) {
    let id;
    for (let i = 1; i <= 99; i++) {
      const cand = 'S' + String(i).padStart(2, '0');
      if (!taken[cand] && !batch[cand]) { id = cand; break; }
    }
    const salt = Math.random().toString(36).slice(2, 10);
    batch[id] = {
      text: q.text,
      options: q.options,
      salt: salt,
      answerHash: await sha256(id + '|' + salt + '|' + q.correct),
      active: true,
    };
  }
  const write = replace ? db.ref('questions').set(batch) : db.ref('questions').update(batch);
  write.then(() => {
    lastImportReport = '✅ Imported ' + Object.keys(batch).length + ' question(s).' +
      (errors.length ? ' Skipped — ' + errors.join(' · ') : '');
    adminToast('Imported ' + Object.keys(batch).length + ' questions ✓');
    renderHostPanel();
  });
}

function onQuestionAction(e) {
  const id = e.target.dataset.id;
  const act = e.target.dataset.act;
  if (act === 'toggle') {
    db.ref('questions/' + id + '/active').set(adminQuestions[id].active === false);
  } else if (act === 'del') {
    if (confirm('Delete ' + id + '? Its station QR poster stops working.')) {
      db.ref('questions/' + id).remove().then(() => adminToast(id + ' deleted'));
    }
  } else if (act === 'edit') {
    openQuestionEditor(id);
  }
}

function openQuestionEditor(id) {
  questionEditorOpen = true;
  const q = id ? adminQuestions[id] : { text: '', options: ['', '', '', ''] };
  const box = document.getElementById('q-editor');
  box.innerHTML =
    '<div class="card" style="margin-top:1rem; background:var(--bg); box-shadow:none;">' +
    '<b>' + (id ? 'Edit ' + id : 'New question (' + nextQuestionId() + ')') + '</b>' +
    '<label class="field">Question<input id="qe-text" class="input" maxlength="200" value="' + esc(q.text) + '"></label>' +
    [0, 1, 2, 3].map((i) =>
      '<label class="field q-opt"><input type="radio" name="qe-correct" value="' + i + '">' +
      '<input id="qe-opt' + i + '" class="input" maxlength="80" placeholder="Option ' + (i + 1) + '" value="' + esc((q.options || [])[i] || '') + '"></label>'
    ).join('') +
    '<p style="font-size:.83rem; color:var(--muted);">Tick the radio next to the correct option. Answers are stored as salted hashes, so the correct one must be re-picked every time you save.</p>' +
    '<button id="qe-save" class="btn violet">Save question</button> ' +
    '<button id="qe-cancel" class="btn mini">Cancel</button>' +
    '<div id="qe-notice" class="notice" hidden></div></div>';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('qe-cancel').addEventListener('click', () => {
    questionEditorOpen = false;
    renderHostPanel();
  });
  document.getElementById('qe-save').addEventListener('click', async () => {
    const text = document.getElementById('qe-text').value.trim();
    const options = [0, 1, 2, 3].map((i) => document.getElementById('qe-opt' + i).value.trim());
    const picked = document.querySelector('input[name="qe-correct"]:checked');
    const notice = document.getElementById('qe-notice');
    if (!text || options.some((o) => !o) || !picked) {
      notice.textContent = 'Fill the question, all 4 options, and tick the correct one.';
      notice.hidden = false;
      return;
    }
    const qid = id || nextQuestionId();
    const salt = Math.random().toString(36).slice(2, 10);
    const answerHash = await sha256(qid + '|' + salt + '|' + picked.value);
    questionEditorOpen = false;
    db.ref('questions/' + qid).set({
      text: text,
      options: options,
      salt: salt,
      answerHash: answerHash,
      active: id ? adminQuestions[id].active !== false : true,
    }).then(() => adminToast(qid + ' saved ✓'));
  });
}

/* ---- Live Control tab: phases, per-team adjustments, release, reset ---- */
function renderLiveControlTab(panel) {
  const phases = [['setup', 'Setup'], ['scramble', 'Scramble'], ['blindshot', 'Blind Shot'], ['results', 'Results']];
  let html = '<h3 class="panel-title">Live Control</h3><div class="phase-row">' +
    phases.map(([key, label]) =>
      '<button class="btn mini' + ((config.phase || 'setup') === key ? ' phase-on' : '') + '" data-phase="' + key + '" data-label="' + label + '">' + label + '</button>'
    ).join('') + '</div>';
  const ids = Object.keys(adminTeams).sort((a, b) => (adminTeams[a].joinedAt || 0) - (adminTeams[b].joinedAt || 0));
  html += ids.length ? ids.map((id) => {
    const t = adminTeams[id];
    return '<div class="lc-row"><span class="team-dot" style="background:' + esc(t.colour) + '"></span>' +
      '<b>' + esc(t.name) + '</b>' +
      '<span style="color:var(--muted); font-size:.85rem;">' + (t.bonusSec || 0) + 's banked' + (t.deviceToken ? '' : ' · 📵 released') + '</span>' +
      '<span class="q-actions">' +
      '<input id="adj-' + id + '" class="input mini-num" type="number" placeholder="±s">' +
      '<button class="btn mini" data-adj="' + id + '">Apply</button>' +
      '<button class="btn mini" data-release="' + id + '"' + (t.deviceToken ? '' : ' disabled') + '>Release device</button>' +
      '<button class="btn mini danger" data-remove="' + id + '">Remove</button></span></div>';
  }).join('') : '<p style="color:var(--muted);">No teams registered yet.</p>';
  html += '<hr style="margin:1.2rem 0; border:none; border-top:2px solid #F1EAF8;">' +
    '<button id="lc-reset" class="btn danger">Reset game (keeps questions & settings)</button>';
  panel.innerHTML = html;

  panel.querySelectorAll('[data-phase]').forEach((btn) => btn.addEventListener('click', () => {
    const phase = btn.dataset.phase;
    if (!confirm('Switch phase to ' + btn.dataset.label + '?')) return;
    const updates = { phase: phase };
    updates.scrambleEndsAt = (phase === 'scramble') ? Date.now() + (config.scrambleMins || 25) * 60000 : null;
    db.ref('config').update(updates).then(() => adminToast('Phase: ' + btn.dataset.label));
  }));
  panel.querySelectorAll('[data-adj]').forEach((btn) => btn.addEventListener('click', () => {
    const id = btn.dataset.adj;
    const delta = parseInt(document.getElementById('adj-' + id).value, 10);
    if (!delta) return;
    db.ref('teams/' + id + '/bonusSec').transaction((v) => Math.max(0, (v || 0) + delta))
      .then(() => adminToast((delta > 0 ? '+' : '') + delta + 's applied'));
  }));
  panel.querySelectorAll('[data-release]').forEach((btn) => btn.addEventListener('click', () => {
    const id = btn.dataset.release;
    if (!confirm('Release ' + adminTeams[id].name + "'s device? The next phone to join with this exact team name takes over.")) return;
    db.ref('teams/' + id + '/deviceToken').remove().then(() => adminToast('Device released'));
  }));
  panel.querySelectorAll('[data-remove]').forEach((btn) => btn.addEventListener('click', () => {
    const id = btn.dataset.remove;
    if (!confirm('Remove team "' + adminTeams[id].name + '" entirely?')) return;
    db.ref('teams/' + id).remove().then(() => adminToast('Team removed'));
  }));
  document.getElementById('lc-reset').addEventListener('click', () => {
    if (!confirm('Reset the game? This deletes ALL teams and progress. Questions & settings stay.')) return;
    db.ref().update({
      teams: null, stations: null, blindshot: null, feed: null, cards: null,
      'config/phase': 'setup', 'config/scrambleEndsAt': null,
    }).then(() => adminToast('Game reset — back to Setup'));
  });
}

/* ---- Data tab: raw state + CSV export (SPEC.md §9) ---- */
function renderDataTab(panel) {
  panel.innerHTML = '<h3 class="panel-title">Data</h3>' +
    '<button id="data-refresh" class="btn mini">Refresh</button> ' +
    '<button id="data-csv" class="btn violet" style="margin-left:.5rem;">Export results CSV</button>' +
    '<pre id="data-raw" class="data-raw">Loading…</pre>';
  const load = () => db.ref('/').once('value').then((s) => {
    document.getElementById('data-raw').textContent = JSON.stringify(s.val(), null, 2) || '(empty)';
  });
  load();
  document.getElementById('data-refresh').addEventListener('click', load);
  document.getElementById('data-csv').addEventListener('click', exportCsv);
}

function exportCsv() {
  const rows = [['Team', 'Colour', 'Banked seconds', 'Stations cleared', 'Power-up cards', 'Baskets']];
  Object.values(adminTeams)
    .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0))
    .forEach((t) => rows.push([
      t.name, t.colour, t.bonusSec || 0,
      Object.keys(t.cleared || {}).length,
      Object.keys(t.powerups || {}).length,
      '', /* baskets — filled once Blind Shot is built */
    ]));
  const csv = rows.map((r) => r.map((v) => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = (config.eventName || 'results').replace(/[^\w-]+/g, '-') + '-results.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  adminToast('CSV downloaded');
}
